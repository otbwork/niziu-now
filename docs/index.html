<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NiziU NOW — 最新情報まとめ</title>
  <meta name="description" content="NiziU（JYP／Sony Music）の最新情報を、信頼度つきで自動集約。公式・ニュース・YouTube・グッズをワンタッチでチェック。" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="NiziU NOW" />

  <link rel="stylesheet" href="styles.css" />

  <!-- 起動スプラッシュの基本スタイルは index.html に直接埋め込み、
       styles.css がキャッシュで古くても必ず「全画面表示→自動消去」が効くようにする -->
  <style>
    #splash{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
      background:#e9d3cc;animation:splashOut 2.4s ease forwards;}
    #splash img{width:74%;max-width:460px;height:auto;display:block;animation:splashLogo 2.4s ease forwards;}
    @keyframes splashOut{0%,62%{opacity:1}100%{opacity:0;visibility:hidden}}
    @keyframes splashLogo{0%{opacity:0;transform:scale(.92)}22%{opacity:1;transform:scale(1)}
      62%{opacity:1;transform:scale(1.02)}100%{opacity:0;transform:scale(1.06)}}
    @media(prefers-reduced-motion:reduce){#splash{animation:splashOut 1s ease .6s forwards}#splash img{animation:none}}
  </style>
</head>
<body>
  <!-- 起動スプラッシュ（トップ画像を画面いっぱいに表示してからフェードアウト） -->
  <div id="splash" class="splash" aria-hidden="true">
    <img class="splash-logo" src="img/niziu-logo.svg" alt="NiziU" />
  </div>
  <script>
    /* app.js のキャッシュ状態に関係なく、スプラッシュを確実に取り除く */
    (function () {
      var s = document.getElementById('splash');
      if (!s) return;
      var go = function () { if (s && s.parentNode) s.parentNode.removeChild(s); };
      s.addEventListener('animationend', go, { once: true });
      setTimeout(go, 2600);
    })();
  </script>

  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-text">
          <h1>NIZIU <span>NOW</span></h1>
          <p class="tagline">for WithU</p>
        </div>
      </div>
      <button id="refreshBtn" class="icon-btn" title="更新" aria-label="更新">⟳</button>
    </div>

    <nav class="official-links" aria-label="公式リンク">
      <a href="https://niziu.com/" rel="noopener">Official Site</a>
      <a href="https://www.youtube.com/c/NiziUOfficial" rel="noopener">YouTube</a>
      <a href="https://www.instagram.com/niziu_info_official/" rel="noopener">Instagram</a>
      <a href="https://x.com/NiziU__official" rel="noopener">X</a>
    </nav>
  </header>

  <div class="hero">
    <img class="hero-logo" src="img/niziu-logo.svg" alt="NiziU" />
    <p class="hero-sub">Official News &amp; Updates</p>
  </div>

  <section class="controls">
    <a class="shop-cta" href="https://jypj-store.com/collections/niziu-official-goods" rel="noopener">
      Official Goods — JYP JAPAN STORE
    </a>

    <div class="upcoming" id="upcoming" aria-label="誕生日・記念日カウントダウン"></div>

    <div id="schedule-sec" style="display:none">
      <h2 class="section-title">SCHEDULE</h2>
      <div class="schedule" id="schedule" aria-label="ライブ・リリース予定"></div>
      <p class="schedule-note">ニュース記事から自動抽出した予定です。正式な日程は必ず公式サイトでご確認ください。</p>
    </div>

    <h2 class="section-title">NEWS</h2>
    <div class="member-note" id="memberNote" style="display:none"></div>

    <input id="searchBox" class="search" type="search"
           placeholder="キーワードで検索（曲名・メンバー名など）" aria-label="キーワード検索" />

    <div class="filters" id="filters">
      <button class="chip is-active" data-filter="all">すべて</button>
      <button class="chip" data-filter="official">公式</button>
      <button class="chip" data-filter="goods">グッズ</button>
      <button class="chip" data-filter="youtube">YouTube</button>
      <button class="chip" data-filter="news">ニュース</button>
      <button class="chip" data-filter="verified">確実な情報のみ</button>
      <button class="chip" data-filter="fav">♡ お気に入り</button>
    </div>
  </section>

  <main id="feed" class="feed" aria-live="polite">
    <div class="state">読み込み中…</div>
  </main>

  <section class="members-sec">
    <h2 class="section-title">MEMBER</h2>
    <div class="members" id="members" aria-label="メンバー一覧"></div>
  </section>

  <footer class="app-footer">
    <img class="footer-logo" src="img/niziu-logo.svg" alt="NiziU" />
    <p id="updatedAt"></p>
    <p class="disclaimer">信頼度は情報源の種類などから自動判定した目安です。最終確認は公式情報をご覧ください。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
